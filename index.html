<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0d;
      --white: #fffef5;
      --yellow: #ffe135;
      --pink:   #ff4fa3;
      --blue:   #2563eb;
      --green:  #16a34a;
      --orange: #ea580c;
      --red:    #dc2626;
      --gray:   #a3a3a3;
      --border: 2.5px solid var(--black);
      --shadow: 5px 5px 0 var(--black);
      --shadow-lg: 8px 8px 0 var(--black);
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: stretch;
    }

    .header-title {
      padding: 28px 32px;
      border-right: var(--border);
    }

    .header-title h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      text-transform: uppercase;
    }

    .header-title .tagline {
      font-size: 12px;
      color: var(--gray);
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      border-bottom: var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 14px 20px;
      border: none;
      border-right: var(--border);
      background: transparent;
      color: var(--gray);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: var(--yellow); color: var(--black); }
    .filter-btn.active { background: var(--black); color: var(--white); }

    .filter-btn .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── BUTTONS ── */
    .btn-add {
      padding: 12px 24px;
      background: var(--yellow);
      color: var(--black);
      border: var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }
    .btn-add:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }

    /* ── MAIN ── */
    main { padding: 32px; max-width: 1100px; margin: 0 auto; }

    /* ── STATS ── */
    .stats { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }

    .stat-chip {
      border: var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      box-shadow: 3px 3px 0 var(--black);
    }

    .stat-chip .n { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; line-height: 1; }
    .stat-chip .l { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--gray); }

    /* ── COMPANY CARDS ── */
    .jobs-list { display: flex; flex-direction: column; gap: 16px; }

    .company-card {
      border: var(--border);
      background: var(--white);
      box-shadow: var(--shadow);
      transition: transform 0.12s, box-shadow 0.12s;
    }

    .company-card:hover { transform: translate(-2px,-2px); box-shadow: var(--shadow-lg); }

    .company-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      border-bottom: var(--border);
      background: var(--black);
      color: var(--white);
      gap: 12px;
      flex-wrap: wrap;
    }

    .company-name {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.3px;
    }

    .company-location {
      font-size: 11px;
      color: var(--gray);
      font-family: 'Space Mono', monospace;
      margin-top: 2px;
    }

    .company-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .position-count {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--gray);
    }

    .btn-add-role {
      padding: 5px 12px;
      background: var(--yellow);
      color: var(--black);
      border: 2px solid var(--yellow);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      transition: background 0.1s;
    }

    .btn-add-role:hover { background: #ffd700; border-color: #ffd700; }

    .btn-edit-company {
      padding: 5px 10px;
      background: transparent;
      color: var(--gray);
      border: 2px solid #444;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      transition: color 0.1s, border-color 0.1s;
    }

    .btn-edit-company:hover { color: var(--white); border-color: var(--white); }

    /* ── POSITION ROWS ── */
    .position-row {
      display: grid;
      grid-template-columns: 6px 1fr;
      border-bottom: 2px solid #eee;
      transition: background 0.1s;
    }

    .position-row:last-child { border-bottom: none; }
    .position-row:hover { background: #fafaf0; }

    .pos-stripe { width: 6px; }

    .pos-body {
      padding: 14px 22px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .pos-left { flex: 1; min-width: 0; }

    .pos-role {
      font-weight: 700;
      font-size: 14px;
    }

    .pos-notes {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 500px;
    }

    .pos-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .status-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 10px;
      border: 2px solid currentColor;
      white-space: nowrap;
    }

    .date-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--gray);
    }

    .pos-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .position-row:hover .pos-actions { opacity: 1; }

    .pos-actions button, .pos-actions a {
      padding: 3px 10px;
      border: 2px solid var(--black);
      background: var(--white);
      color: var(--black);
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: background 0.1s;
    }

    .pos-actions button:hover { background: var(--yellow); }
    .pos-actions .del-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }

    /* ── TIMELINE ── */
    .pos-col { min-width: 0; }

    .btn-timeline {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--gray);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0;
      margin-top: 6px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }
    .btn-timeline:hover { color: var(--black); }
    .btn-timeline .caret { transition: transform 0.12s; display: inline-block; }
    .btn-timeline.open .caret { transform: rotate(90deg); }

    .timeline {
      padding: 4px 22px 18px 22px;
      border-top: 2px dashed #e2e2d5;
      margin-top: 8px;
    }

    .tl-event {
      display: grid;
      grid-template-columns: 12px 70px auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      position: relative;
    }
    .tl-event + .tl-event { border-top: 1px solid #f0f0e6; }

    .tl-dot {
      width: 11px; height: 11px;
      border: 2px solid var(--black);
      border-radius: 50%;
    }

    .tl-date {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      white-space: nowrap;
    }

    .tl-status {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
    }

    .tl-note {
      font-size: 12.5px;
      color: var(--black);
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tl-note.empty { color: #c4c4b8; font-style: italic; }

    .tl-evt-actions { display: flex; gap: 6px; opacity: 0; transition: opacity 0.12s; }
    .tl-event:hover .tl-evt-actions { opacity: 1; }
    .tl-evt-actions button {
      padding: 2px 8px;
      border: 2px solid var(--black);
      background: var(--white);
      cursor: pointer;
      font-size: 9px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }
    .tl-evt-actions button:hover { background: var(--yellow); }
    .tl-evt-actions .tl-del:hover { background: var(--red); color: var(--white); border-color: var(--red); }

    .btn-add-event {
      margin-top: 10px;
      padding: 6px 14px;
      background: var(--white);
      border: 2px solid var(--black);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: background 0.1s;
    }
    .btn-add-event:hover { background: var(--yellow); }

    /* ── SNAPSHOT ── */
    .pos-actions .snap-btn.has-snap { background: var(--green); color: var(--white); border-color: var(--green); }
    .pos-actions .snap-btn.has-snap:hover { background: #128a3e; }
    .pos-actions .snap-btn[disabled] { opacity: 0.6; cursor: progress; }

    .snapshot-meta {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--gray);
      margin-bottom: 14px;
      line-height: 1.6;
      word-break: break-all;
    }
    .snapshot-meta a { color: var(--blue); }

    .snapshot-text {
      white-space: pre-wrap;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      line-height: 1.6;
      border: 2px solid var(--black);
      padding: 16px;
      max-height: 55vh;
      overflow-y: auto;
      background: #fffef5;
    }

    /* Status colors */
    .s-Interested    { color: var(--blue); }
    .s-Applied       { color: #7c3aed; }
    .s-Phone         { color: var(--orange); }
    .s-Interviewing  { color: var(--pink); }
    .s-Offer         { color: var(--green); }
    .s-Rejected      { color: var(--red); }
    .s-Withdrawn     { color: var(--gray); }

    .bg-Interested   { background: var(--blue); }
    .bg-Applied      { background: #7c3aed; }
    .bg-Phone        { background: var(--orange); }
    .bg-Interviewing { background: var(--pink); }
    .bg-Offer        { background: var(--green); }
    .bg-Rejected     { background: var(--red); }
    .bg-Withdrawn    { background: var(--gray); }

    /* ── EMPTY ── */
    .empty-state {
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 72px 32px;
      text-align: center;
    }

    .empty-state .big { font-size: 52px; }
    .empty-state .msg { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; text-transform: uppercase; margin-top: 16px; }
    .empty-state p { color: var(--gray); margin-top: 8px; font-size: 13px; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,13,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border: var(--border);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-titlebar {
      background: var(--black);
      color: var(--yellow);
      padding: 16px 24px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-titlebar button {
      background: none;
      border: none;
      color: var(--yellow);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
    }

    .modal-body { padding: 24px; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }

    .field label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
      color: var(--gray);
    }

    .field input, .field select, .field textarea {
      background: var(--white);
      border: 2px solid var(--black);
      padding: 10px 12px;
      color: var(--black);
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none;
      transition: box-shadow 0.12s;
      width: 100%;
      appearance: none;
      border-radius: 0;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      box-shadow: 4px 4px 0 var(--black);
    }

    .field textarea { resize: vertical; min-height: 80px; }

    .section-divider {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gray);
      border-top: 2px solid #eee;
      padding-top: 16px;
      margin-bottom: 14px;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--black);
    }

    .btn-cancel {
      padding: 10px 20px;
      background: var(--white);
      border: 2px solid var(--black);
      color: var(--black);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      transition: background 0.1s;
    }

    .btn-cancel:hover { background: #eee; }

    .btn-save {
      padding: 10px 24px;
      background: var(--yellow);
      border: 2px solid var(--black);
      box-shadow: 3px 3px 0 var(--black);
      color: var(--black);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-save:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); }
    .btn-save:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }

    /* company name suggestion dropdown */
    #company-datalist { display: none; }

    @media (max-width: 600px) {
      header { grid-template-columns: 1fr; }
      .header-title { border-right: none; border-bottom: var(--border); }
      .header-actions { padding: 16px 24px; }
      main { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
      .pos-body { flex-direction: column; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Job Search<br/>Tracker</h1>
    <div class="tagline" id="header-subtitle">0 jobs tracked</div>
  </div>
  <div class="header-actions">
    <button class="btn-add" id="add-btn">＋ Add Job</button>
  </div>
</header>

<div class="filter-bar" id="filter-group">
  <button class="filter-btn active" data-filter="All">All</button>
  <button class="filter-btn" data-filter="Interested"><span class="dot" style="background:var(--blue)"></span>Interested</button>
  <button class="filter-btn" data-filter="Applied"><span class="dot" style="background:#7c3aed"></span>Applied</button>
  <button class="filter-btn" data-filter="Phone"><span class="dot" style="background:var(--orange)"></span>Phone</button>
  <button class="filter-btn" data-filter="Interviewing"><span class="dot" style="background:var(--pink)"></span>Interviewing</button>
  <button class="filter-btn" data-filter="Offer"><span class="dot" style="background:var(--green)"></span>Offer</button>
  <button class="filter-btn" data-filter="Rejected"><span class="dot" style="background:var(--red)"></span>Rejected</button>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div class="jobs-list" id="jobs-list"></div>
</main>

<!-- Add/Edit position modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-titlebar">
      <span id="modal-title">// ADD JOB</span>
      <button id="close-x-btn">×</button>
    </div>
    <div class="modal-body">
      <div class="section-divider">Company</div>
      <div class="form-row">
        <div class="field">
          <label>Company *</label>
          <input id="f-company" type="text" list="company-list" placeholder="e.g. Anthropic" autocomplete="off" />
          <datalist id="company-list"></datalist>
        </div>
        <div class="field">
          <label>Location</label>
          <input id="f-location" type="text" placeholder="e.g. San Francisco, CA" />
        </div>
      </div>
      <div class="section-divider">Position</div>
      <div class="form-row">
        <div class="field">
          <label>Role *</label>
          <input id="f-role" type="text" placeholder="e.g. Software Engineer" />
        </div>
        <div class="field" id="f-status-field">
          <label>Status</label>
          <select id="f-status">
            <option value="Interested">Interested</option>
            <option value="Applied">Applied</option>
            <option value="Phone">Phone Screen</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
            <option value="Withdrawn">Withdrawn</option>
          </select>
        </div>
        <div class="field" id="f-date-field">
          <label>Date Added</label>
          <input id="f-date" type="date" />
        </div>
        <div class="field">
          <label>Job URL</label>
          <input id="f-url" type="url" placeholder="https://…" />
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Referral, recruiter name, next steps, interview impressions…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-btn">Cancel</button>
        <button class="btn-save" id="save-btn">Save →</button>
      </div>
    </div>
  </div>
</div>

<!-- Edit company modal -->
<div class="modal-backdrop" id="company-modal-backdrop">
  <div class="modal">
    <div class="modal-titlebar">
      <span>// EDIT COMPANY</span>
      <button id="company-close-btn">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field">
          <label>Company Name *</label>
          <input id="fc-name" type="text" />
        </div>
        <div class="field">
          <label>Location</label>
          <input id="fc-location" type="text" />
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="company-cancel-btn">Cancel</button>
        <button class="btn-save" id="company-delete-btn" style="background:#fee2e2;box-shadow:3px 3px 0 var(--black)">Delete Company →</button>
        <button class="btn-save" id="company-save-btn">Save →</button>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit timeline event modal -->
<div class="modal-backdrop" id="event-modal-backdrop">
  <div class="modal">
    <div class="modal-titlebar">
      <span id="event-modal-title">// ADD EVENT</span>
      <button id="event-close-btn">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field">
          <label>Date</label>
          <input id="fe-date" type="date" />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="fe-status">
            <option value="Interested">Interested</option>
            <option value="Applied">Applied</option>
            <option value="Phone">Phone Screen</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
            <option value="Withdrawn">Withdrawn</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Note</label>
        <textarea id="fe-note" placeholder="e.g. Recruiter call, onsite round 2 with hiring manager, take-home sent…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="event-cancel-btn">Cancel</button>
        <button class="btn-save" id="event-save-btn">Save →</button>
      </div>
    </div>
  </div>
</div>

<!-- Snapshot viewer modal -->
<div class="modal-backdrop" id="snapshot-modal-backdrop">
  <div class="modal" style="max-width:720px">
    <div class="modal-titlebar">
      <span id="snapshot-modal-title">// SNAPSHOT</span>
      <button id="snapshot-close-btn">×</button>
    </div>
    <div class="modal-body">
      <div class="snapshot-meta" id="snapshot-meta"></div>
      <div class="snapshot-text" id="snapshot-text"></div>
      <div class="modal-actions">
        <button class="btn-cancel" id="snapshot-recapture-btn">↻ Re-capture</button>
        <button class="btn-save" id="snapshot-done-btn">Done</button>
      </div>
    </div>
  </div>
</div>

<script>
  const STATUSES = ['Interested','Applied','Phone','Interviewing','Offer','Rejected','Withdrawn'];
  const STATUS_LABEL = { Phone: 'Phone Screen' };
  const STATUS_EMOJI = { Interested:'👀', Applied:'📬', Phone:'📞', Interviewing:'🎯', Offer:'🎉', Rejected:'✗', Withdrawn:'↩' };

  // companies: [{ id, company, location, positions: [{ id, role, url, notes, status, date,
  //   history: [{ id, date, status, note }] }] }]
  // `status`/`date` on a position are derived from the latest history event.
  let companies = [];
  let editingCompanyId = null; // company being edited in position modal
  let editingPositionId = null; // position being edited (null = new)
  let editingCompanyEntityId = null; // for company-edit modal
  let eventCompanyId = null, eventPositionId = null, eventId = null; // for event modal
  const expanded = new Set(); // position ids with timeline open
  const capturing = new Set(); // position ids whose snapshot is being captured
  let snapshotViewing = null; // { companyId, positionId } currently shown in viewer

  async function load() {
    try {
      const raw = await (await fetch('/api/jobs')).json();
      // migrate flat format → nested, then ensure every position has a history timeline
      companies = ensureHistory(migrateLegacy(raw));
    } catch { companies = []; }
  }

  // Seed a history event for any position that predates the timeline feature,
  // and keep each position's status/date synced to its latest event.
  function ensureHistory(data) {
    if (!Array.isArray(data)) return data;
    data.forEach(c => (c.positions || []).forEach(p => {
      if (!Array.isArray(p.history) || p.history.length === 0) {
        p.history = [{ id: uid(), date: p.date || todayISO(), status: p.status || 'Interested', note: '' }];
      }
      syncStatus(p);
    }));
    return data;
  }

  // History sorted oldest → newest (by date, stable for equal dates).
  function sortedHistory(p) {
    return p.history
      .map((e, i) => ({ e, i }))
      .sort((a, b) => (a.e.date || '').localeCompare(b.e.date || '') || a.i - b.i)
      .map(x => x.e);
  }

  function syncStatus(p) {
    const h = sortedHistory(p);
    const latest = h[h.length - 1];
    p.status = latest.status;            // current status = most recent event
    p.date = latest.date;                // row date = most recent activity
  }

  function migrateLegacy(data) {
    if (!Array.isArray(data) || data.length === 0) return data;
    // detect legacy: items have top-level `role` and no `positions`
    if (data[0] && data[0].role !== undefined && !data[0].positions) {
      const map = {};
      data.forEach(j => {
        const key = j.company.trim().toLowerCase();
        if (!map[key]) {
          map[key] = { id: uid(), company: j.company, location: j.location || '', positions: [] };
        }
        map[key].positions.push({
          id: uid(), role: j.role, status: j.status,
          date: j.date || '', url: j.url || '', notes: j.notes || ''
        });
      });
      return Object.values(map);
    }
    return data;
  }

  async function save() {
    await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(companies),
    });
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function todayISO() { return new Date().toISOString().slice(0,10); }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+d}`;
  }

  function allPositions() {
    return companies.flatMap(c => c.positions.map(p => ({ ...p, _companyId: c.id })));
  }

  function filteredCompanies() {
    if (activeFilter === 'All') return companies;
    return companies
      .map(c => ({ ...c, positions: c.positions.filter(p => p.status === activeFilter) }))
      .filter(c => c.positions.length > 0);
  }

  let activeFilter = 'All';

  function renderStats() {
    const counts = {};
    STATUSES.forEach(s => counts[s] = 0);
    allPositions().forEach(p => { if (counts[p.status] != null) counts[p.status]++; });
    const total = allPositions().length;

    document.getElementById('header-subtitle').textContent =
      `${companies.length} COMPAN${companies.length !== 1 ? 'IES' : 'Y'} · ${total} POSITION${total !== 1 ? 'S' : ''}`;

    document.getElementById('stats').innerHTML = `
      <div class="stat-chip">
        <span class="n">${companies.length}</span>
        <span class="l">Companies</span>
      </div>
      <div class="stat-chip">
        <span class="n">${total}</span>
        <span class="l">Positions</span>
      </div>
      ${STATUSES.filter(s => counts[s] > 0).map(s => `
        <div class="stat-chip">
          <span class="n s-${s}">${counts[s]}</span>
          <span class="l">${STATUS_EMOJI[s]} ${STATUS_LABEL[s] || s}</span>
        </div>`).join('')}
    `;
  }

  function renderJobs() {
    const list = document.getElementById('jobs-list');
    const shown = filteredCompanies();

    if (shown.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="big">${activeFilter === 'All' ? '📋' : STATUS_EMOJI[activeFilter] || '🔍'}</div>
        <div class="msg">${activeFilter === 'All' ? 'Nothing here yet' : `No ${activeFilter} positions`}</div>
        <p>${activeFilter === 'All' ? 'Hit "+ Add Job" to start tracking.' : 'Try a different filter.'}</p>
      </div>`;
      return;
    }

    list.innerHTML = shown.map(c => `
      <div class="company-card">
        <div class="company-header">
          <div>
            <div class="company-name">${escHtml(c.company)}</div>
            ${c.location ? `<div class="company-location">— ${escHtml(c.location)}</div>` : ''}
          </div>
          <div class="company-header-right">
            <span class="position-count">${c.positions.length} position${c.positions.length !== 1 ? 's' : ''}</span>
            <button class="btn-add-role" onclick="openAddPosition('${c.id}')">＋ Role</button>
            <button class="btn-edit-company" onclick="openEditCompany('${c.id}')">Edit</button>
          </div>
        </div>
        ${c.positions.map(p => {
          const label = STATUS_LABEL[p.status] || p.status;
          const isOpen = expanded.has(p.id);
          const evCount = p.history.length;
          return `
          <div class="position-row">
            <div class="pos-stripe bg-${p.status}"></div>
            <div class="pos-col">
              <div class="pos-body">
                <div class="pos-left">
                  <div class="pos-role">${escHtml(p.role)}</div>
                  ${p.notes ? `<div class="pos-notes">"${escHtml(p.notes)}"</div>` : ''}
                  <button class="btn-timeline ${isOpen ? 'open' : ''}" onclick="toggleTimeline('${p.id}')">
                    <span class="caret">▸</span> ${evCount} event${evCount !== 1 ? 's' : ''}
                  </button>
                </div>
                <div class="pos-right">
                  <div class="pos-actions" onclick="event.stopPropagation()">
                    ${p.url ? `<a href="${escHtml(p.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ View</a>` : ''}
                    ${snapshotButton(c.id, p)}
                    <button onclick="openEditPosition('${c.id}','${p.id}')">Edit</button>
                    <button class="del-btn" onclick="deletePosition('${c.id}','${p.id}')">Delete</button>
                  </div>
                  <span class="status-tag s-${p.status}">${STATUS_EMOJI[p.status]} ${label}</span>
                  <span class="date-tag">${fmtDate(p.date)}</span>
                </div>
              </div>
              ${isOpen ? renderTimeline(c.id, p) : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
    `).join('');
  }

  function renderTimeline(companyId, p) {
    const events = sortedHistory(p);
    return `
      <div class="timeline">
        ${events.map(e => {
          const label = STATUS_LABEL[e.status] || e.status;
          return `
          <div class="tl-event">
            <span class="tl-dot bg-${e.status}"></span>
            <span class="tl-date">${fmtDate(e.date) || '—'}</span>
            <span class="tl-status s-${e.status}">${STATUS_EMOJI[e.status]} ${label}</span>
            <span class="tl-note ${e.note ? '' : 'empty'}">${e.note ? escHtml(e.note) : 'no note'}</span>
            <span class="tl-evt-actions">
              <button onclick="openEditEvent('${companyId}','${p.id}','${e.id}')">Edit</button>
              <button class="tl-del" onclick="deleteEvent('${companyId}','${p.id}','${e.id}')">Del</button>
            </span>
          </div>`;
        }).join('')}
        <button class="btn-add-event" onclick="openAddEvent('${companyId}','${p.id}')">＋ Add event</button>
      </div>`;
  }

  function toggleTimeline(positionId) {
    if (expanded.has(positionId)) expanded.delete(positionId);
    else expanded.add(positionId);
    renderJobs();
  }

  // ── snapshot ──
  function snapshotButton(companyId, p) {
    if (capturing.has(p.id)) return `<button class="snap-btn" disabled>📸 Saving…</button>`;
    if (p.snapshot) return `<button class="snap-btn has-snap" onclick="openSnapshot('${companyId}','${p.id}')">📸 Snapshot</button>`;
    return `<button class="snap-btn" onclick="captureSnapshot('${companyId}','${p.id}')">📸 Snapshot</button>`;
  }

  async function captureSnapshot(companyId, positionId) {
    const c = companies.find(x => x.id === companyId);
    const p = c?.positions.find(x => x.id === positionId);
    if (!p) return;
    if (!p.url) { alert('Add a job URL for this position first, then snapshot it.'); return; }

    capturing.add(positionId);
    renderJobs();
    try {
      const res = await fetch('/api/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ positionId, url: p.url }),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.error || 'Snapshot failed.'); return; }
      p.snapshot = { capturedAt: data.capturedAt, title: data.title, chars: data.chars };
      await save();
    } catch (err) {
      alert('Snapshot failed: ' + err.message);
    } finally {
      capturing.delete(positionId);
      render();
    }
  }

  async function openSnapshot(companyId, positionId) {
    const res = await fetch('/api/snapshot/' + encodeURIComponent(positionId));
    if (!res.ok) { alert('Snapshot not found on disk — try re-capturing it.'); return; }
    const snap = await res.json();
    snapshotViewing = { companyId, positionId };
    document.getElementById('snapshot-modal-title').textContent =
      '// SNAPSHOT — ' + (snap.title ? snap.title.slice(0, 60).toUpperCase() : '');
    document.getElementById('snapshot-meta').innerHTML =
      `Captured ${fmtDateTime(snap.capturedAt)}` +
      (snap.url ? ` · <a href="${escHtml(snap.url)}" target="_blank" rel="noopener">original ↗</a>` : '');
    document.getElementById('snapshot-text').textContent = snap.text || '(no text captured)';
    document.getElementById('snapshot-modal-backdrop').classList.add('open');
  }

  function closeSnapshotModal() {
    document.getElementById('snapshot-modal-backdrop').classList.remove('open');
    snapshotViewing = null;
  }

  function fmtDateTime(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() { renderStats(); renderJobs(); updateCompanyDatalist(); }

  function updateCompanyDatalist() {
    document.getElementById('company-list').innerHTML =
      companies.map(c => `<option value="${escHtml(c.company)}">`).join('');
  }

  // ── filter ──
  document.getElementById('filter-group').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderJobs();
  });

  // ── position modal ──
  function openAddJob() {
    editingCompanyId = null;
    editingPositionId = null;
    document.getElementById('modal-title').textContent = '// ADD JOB';
    document.getElementById('f-company').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-status').value = 'Interested';
    document.getElementById('f-date').value = todayISO();
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('f-company').disabled = false;
    document.getElementById('f-location').disabled = false;
    setStatusDateVisible(true);
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('f-company').focus(), 50);
  }

  // The Status + Date fields seed the first timeline event — only shown when
  // creating a position, not when editing one (status changes flow through events).
  function setStatusDateVisible(show) {
    document.getElementById('f-status-field').style.display = show ? '' : 'none';
    document.getElementById('f-date-field').style.display = show ? '' : 'none';
  }

  function openAddPosition(companyId) {
    const c = companies.find(x => x.id === companyId);
    if (!c) return;
    editingCompanyId = companyId;
    editingPositionId = null;
    document.getElementById('modal-title').textContent = `// ADD ROLE @ ${c.company.toUpperCase()}`;
    document.getElementById('f-company').value = c.company;
    document.getElementById('f-location').value = c.location || '';
    document.getElementById('f-company').disabled = true;
    document.getElementById('f-location').disabled = true;
    document.getElementById('f-role').value = '';
    document.getElementById('f-status').value = 'Interested';
    document.getElementById('f-date').value = todayISO();
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
    setStatusDateVisible(true);
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('f-role').focus(), 50);
  }

  function openEditPosition(companyId, positionId) {
    const c = companies.find(x => x.id === companyId);
    const p = c?.positions.find(x => x.id === positionId);
    if (!c || !p) return;
    editingCompanyId = companyId;
    editingPositionId = positionId;
    document.getElementById('modal-title').textContent = '// EDIT ROLE';
    document.getElementById('f-company').value = c.company;
    document.getElementById('f-location').value = c.location || '';
    document.getElementById('f-company').disabled = true;
    document.getElementById('f-location').disabled = true;
    document.getElementById('f-role').value = p.role;
    document.getElementById('f-url').value = p.url || '';
    document.getElementById('f-notes').value = p.notes || '';
    setStatusDateVisible(false);
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.getElementById('f-company').disabled = false;
    document.getElementById('f-location').disabled = false;
    editingCompanyId = null;
    editingPositionId = null;
  }

  document.getElementById('add-btn').addEventListener('click', openAddJob);
  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  document.getElementById('close-x-btn').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const companyName = document.getElementById('f-company').value.trim();
    const role = document.getElementById('f-role').value.trim();
    document.getElementById('f-company').style.outline = companyName ? '' : '3px solid var(--red)';
    document.getElementById('f-role').style.outline    = role        ? '' : '3px solid var(--red)';
    if (!companyName || !role) return;

    const url   = document.getElementById('f-url').value.trim();
    const notes = document.getElementById('f-notes').value.trim();

    if (editingPositionId) {
      // edit existing position — role/url/notes only; history drives status
      const c = companies.find(x => x.id === editingCompanyId);
      const p = c.positions.find(p => p.id === editingPositionId);
      if (p) { p.role = role; p.url = url; p.notes = notes; }
    } else {
      // creating a position — seed its first timeline event from the form
      const status = document.getElementById('f-status').value;
      const date   = document.getElementById('f-date').value || todayISO();
      const newPos = () => {
        const p = { id: uid(), role, url, notes,
          history: [{ id: uid(), date, status, note: '' }] };
        syncStatus(p);
        return p;
      };
      if (editingCompanyId) {
        // add new position to existing company
        companies.find(x => x.id === editingCompanyId).positions.push(newPos());
      } else {
        // new company + position — merge if company name already exists
        const loc = document.getElementById('f-location').value.trim();
        const existing = companies.find(c => c.company.trim().toLowerCase() === companyName.toLowerCase());
        if (existing) existing.positions.unshift(newPos());
        else companies.unshift({ id: uid(), company: companyName, location: loc, positions: [newPos()] });
      }
    }

    await save();
    closeModal();
    render();
  });

  // ── company edit modal ──
  function openEditCompany(companyId) {
    const c = companies.find(x => x.id === companyId);
    if (!c) return;
    editingCompanyEntityId = companyId;
    document.getElementById('fc-name').value = c.company;
    document.getElementById('fc-location').value = c.location || '';
    document.getElementById('company-modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('fc-name').focus(), 50);
  }

  function closeCompanyModal() {
    document.getElementById('company-modal-backdrop').classList.remove('open');
    editingCompanyEntityId = null;
  }

  document.getElementById('company-cancel-btn').addEventListener('click', closeCompanyModal);
  document.getElementById('company-close-btn').addEventListener('click', closeCompanyModal);
  document.getElementById('company-modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('company-modal-backdrop')) closeCompanyModal();
  });

  document.getElementById('company-save-btn').addEventListener('click', async () => {
    const name = document.getElementById('fc-name').value.trim();
    if (!name) { document.getElementById('fc-name').style.outline = '3px solid var(--red)'; return; }
    const c = companies.find(x => x.id === editingCompanyEntityId);
    if (c) { c.company = name; c.location = document.getElementById('fc-location').value.trim(); }
    await save();
    closeCompanyModal();
    render();
  });

  document.getElementById('company-delete-btn').addEventListener('click', async () => {
    const c = companies.find(x => x.id === editingCompanyEntityId);
    if (!c) return;
    if (!confirm(`Delete ${c.company} and all ${c.positions.length} position(s)?`)) return;
    companies = companies.filter(x => x.id !== editingCompanyEntityId);
    await save();
    closeCompanyModal();
    render();
  });

  // ── timeline event modal ──
  function openAddEvent(companyId, positionId) {
    eventCompanyId = companyId; eventPositionId = positionId; eventId = null;
    const c = companies.find(x => x.id === companyId);
    const p = c?.positions.find(x => x.id === positionId);
    document.getElementById('event-modal-title').textContent = '// ADD EVENT';
    document.getElementById('fe-date').value = todayISO();
    document.getElementById('fe-status').value = p ? p.status : 'Applied';
    document.getElementById('fe-note').value = '';
    document.getElementById('event-modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('fe-note').focus(), 50);
  }

  function openEditEvent(companyId, positionId, evId) {
    const c = companies.find(x => x.id === companyId);
    const p = c?.positions.find(x => x.id === positionId);
    const e = p?.history.find(x => x.id === evId);
    if (!e) return;
    eventCompanyId = companyId; eventPositionId = positionId; eventId = evId;
    document.getElementById('event-modal-title').textContent = '// EDIT EVENT';
    document.getElementById('fe-date').value = e.date || '';
    document.getElementById('fe-status').value = e.status;
    document.getElementById('fe-note').value = e.note || '';
    document.getElementById('event-modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('fe-note').focus(), 50);
  }

  function closeEventModal() {
    document.getElementById('event-modal-backdrop').classList.remove('open');
    eventCompanyId = eventPositionId = eventId = null;
  }

  document.getElementById('event-cancel-btn').addEventListener('click', closeEventModal);
  document.getElementById('event-close-btn').addEventListener('click', closeEventModal);
  document.getElementById('event-modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('event-modal-backdrop')) closeEventModal();
  });

  document.getElementById('event-save-btn').addEventListener('click', async () => {
    const c = companies.find(x => x.id === eventCompanyId);
    const p = c?.positions.find(x => x.id === eventPositionId);
    if (!p) return;
    const evData = {
      date:   document.getElementById('fe-date').value || todayISO(),
      status: document.getElementById('fe-status').value,
      note:   document.getElementById('fe-note').value.trim(),
    };
    if (eventId) {
      const e = p.history.find(x => x.id === eventId);
      if (e) Object.assign(e, evData);
    } else {
      p.history.push({ id: uid(), ...evData });
      expanded.add(p.id);
    }
    syncStatus(p);
    await save();
    closeEventModal();
    render();
  });

  // ── snapshot modal wiring ──
  document.getElementById('snapshot-done-btn').addEventListener('click', closeSnapshotModal);
  document.getElementById('snapshot-close-btn').addEventListener('click', closeSnapshotModal);
  document.getElementById('snapshot-modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('snapshot-modal-backdrop')) closeSnapshotModal();
  });
  document.getElementById('snapshot-recapture-btn').addEventListener('click', async () => {
    if (!snapshotViewing) return;
    const { companyId, positionId } = snapshotViewing;
    closeSnapshotModal();
    await captureSnapshot(companyId, positionId);
  });

  async function deleteEvent(companyId, positionId, evId) {
    const c = companies.find(x => x.id === companyId);
    const p = c?.positions.find(x => x.id === positionId);
    if (!p) return;
    if (p.history.length === 1) { alert('A position needs at least one event. Delete the position instead.'); return; }
    if (!confirm('Delete this event?')) return;
    p.history = p.history.filter(e => e.id !== evId);
    syncStatus(p);
    await save();
    render();
  }

  async function deletePosition(companyId, positionId) {
    const c = companies.find(x => x.id === companyId);
    if (!c) return;
    if (!confirm('Delete this position?')) return;
    c.positions = c.positions.filter(p => p.id !== positionId);
    // remove company if no positions left
    if (c.positions.length === 0) companies = companies.filter(x => x.id !== companyId);
    await save();
    render();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeCompanyModal(); closeEventModal(); closeSnapshotModal(); }
  });

  (async () => { await load(); render(); })();
</script>
</body>
</html>
