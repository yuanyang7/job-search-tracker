<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0d0d0d;
      --white: #fffef5;
      --yellow: #ffe135;
      --pink:   #ff4fa3;
      --blue:   #2563eb;
      --green:  #16a34a;
      --orange: #ea580c;
      --red:    #dc2626;
      --gray:   #a3a3a3;
      --border: 2.5px solid var(--black);
      --shadow: 5px 5px 0 var(--black);
      --shadow-lg: 8px 8px 0 var(--black);
    }

    body {
      background: var(--white);
      color: var(--black);
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: var(--border);
      padding: 0;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: stretch;
    }

    .header-title {
      padding: 28px 32px;
      border-right: var(--border);
    }

    .header-title h1 {
      font-family: 'Space Mono', monospace;
      font-size: clamp(22px, 4vw, 36px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      text-transform: uppercase;
    }

    .header-title .tagline {
      font-size: 12px;
      color: var(--gray);
      margin-top: 6px;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      padding: 0 32px;
      gap: 16px;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      gap: 0;
      border-bottom: var(--border);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 14px 20px;
      border: none;
      border-right: var(--border);
      background: transparent;
      color: var(--gray);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      white-space: nowrap;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .filter-btn:last-child { border-right: none; }
    .filter-btn:hover { background: var(--yellow); color: var(--black); }

    .filter-btn.active {
      background: var(--black);
      color: var(--white);
    }

    .filter-btn .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex-shrink: 0;
    }

    .filter-btn.active .dot { background: currentColor; }

    /* ── BUTTONS ── */
    .btn-add {
      padding: 12px 24px;
      background: var(--yellow);
      color: var(--black);
      border: var(--border);
      box-shadow: var(--shadow);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: transform 0.1s, box-shadow 0.1s;
      white-space: nowrap;
    }

    .btn-add:hover {
      transform: translate(-2px, -2px);
      box-shadow: var(--shadow-lg);
    }

    .btn-add:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }

    /* ── MAIN ── */
    main {
      padding: 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }

    .stat-chip {
      border: var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: baseline;
      gap: 8px;
      background: var(--white);
      box-shadow: 3px 3px 0 var(--black);
    }

    .stat-chip .n {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-chip .l {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray);
    }

    /* ── CARD GRID ── */
    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job-card {
      border: var(--border);
      background: var(--white);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      display: grid;
      grid-template-columns: 8px 1fr;
    }

    .job-card:hover {
      transform: translate(-3px, -3px);
      box-shadow: var(--shadow-lg);
    }

    .job-card:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 var(--black);
    }

    .card-stripe { width: 8px; }

    .card-body { padding: 18px 22px; }

    .card-row1 {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }

    .company {
      font-family: 'Space Mono', monospace;
      font-size: 17px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.3px;
      line-height: 1.1;
    }

    .role {
      font-size: 13px;
      color: var(--gray);
      margin-top: 3px;
      font-weight: 500;
    }

    .location {
      font-size: 11px;
      color: var(--gray);
      margin-top: 2px;
      font-family: 'Space Mono', monospace;
    }

    .status-tag {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 10px;
      border: 2px solid currentColor;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-row2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 8px;
      flex-wrap: wrap;
    }

    .notes-preview {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .date-tag {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--gray);
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .job-card:hover .card-actions { opacity: 1; }

    .card-actions button, .card-actions a {
      padding: 5px 12px;
      border: 2px solid var(--black);
      background: var(--white);
      color: var(--black);
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      text-decoration: none;
      transition: background 0.1s;
      display: inline-flex;
      align-items: center;
    }

    .card-actions button:hover { background: var(--yellow); }
    .card-actions .del-btn:hover { background: var(--red); color: var(--white); border-color: var(--red); }

    /* Status colors */
    .s-Interested   { color: var(--blue); }
    .s-Applied      { color: #7c3aed; }
    .s-Phone        { color: var(--orange); }
    .s-Interviewing { color: var(--pink); }
    .s-Offer        { color: var(--green); }
    .s-Rejected     { color: var(--red); }
    .s-Withdrawn    { color: var(--gray); }

    .bg-Interested   { background: var(--blue); }
    .bg-Applied      { background: #7c3aed; }
    .bg-Phone        { background: var(--orange); }
    .bg-Interviewing { background: var(--pink); }
    .bg-Offer        { background: var(--green); }
    .bg-Rejected     { background: var(--red); }
    .bg-Withdrawn    { background: var(--gray); }

    /* ── EMPTY ── */
    .empty-state {
      border: var(--border);
      box-shadow: var(--shadow);
      padding: 72px 32px;
      text-align: center;
      background: var(--white);
    }

    .empty-state .big { font-size: 52px; }
    .empty-state .msg {
      font-family: 'Space Mono', monospace;
      font-size: 20px;
      font-weight: 700;
      text-transform: uppercase;
      margin-top: 16px;
    }
    .empty-state p { color: var(--gray); margin-top: 8px; font-size: 13px; }

    /* ── MODAL ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(13,13,13,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--white);
      border: var(--border);
      box-shadow: var(--shadow-lg);
      padding: 0;
      width: 100%;
      max-width: 540px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-titlebar {
      background: var(--black);
      color: var(--yellow);
      padding: 16px 24px;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-titlebar button {
      background: none;
      border: none;
      color: var(--yellow);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 0;
    }

    .modal-body { padding: 24px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-family: 'Space Mono', monospace;
      color: var(--gray);
    }

    .field input, .field select, .field textarea {
      background: var(--white);
      border: 2px solid var(--black);
      padding: 10px 12px;
      color: var(--black);
      font-size: 14px;
      font-family: 'Space Grotesk', sans-serif;
      outline: none;
      transition: box-shadow 0.12s;
      width: 100%;
      border-radius: 0;
      appearance: none;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      box-shadow: 4px 4px 0 var(--black);
    }

    .field textarea { resize: vertical; min-height: 90px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid var(--black);
    }

    .btn-cancel {
      padding: 10px 20px;
      background: var(--white);
      border: 2px solid var(--black);
      color: var(--black);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: background 0.1s;
    }

    .btn-cancel:hover { background: #eee; }

    .btn-save {
      padding: 10px 24px;
      background: var(--yellow);
      border: 2px solid var(--black);
      box-shadow: 3px 3px 0 var(--black);
      color: var(--black);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: transform 0.1s, box-shadow 0.1s;
    }

    .btn-save:hover { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--black); }
    .btn-save:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }

    @media (max-width: 600px) {
      header { grid-template-columns: 1fr; }
      .header-title { border-right: none; border-bottom: var(--border); }
      .header-actions { padding: 16px 24px; }
      main { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-title">
    <h1>Job Search<br/>Tracker</h1>
    <div class="tagline" id="header-subtitle">0 jobs tracked</div>
  </div>
  <div class="header-actions">
    <button class="btn-add" id="add-btn">＋ Add Job</button>
  </div>
</header>

<div class="filter-bar" id="filter-group">
  <button class="filter-btn active" data-filter="All">All</button>
  <button class="filter-btn" data-filter="Interested"><span class="dot" style="border-color:var(--blue);background:var(--blue)"></span>Interested</button>
  <button class="filter-btn" data-filter="Applied"><span class="dot" style="border-color:#7c3aed;background:#7c3aed"></span>Applied</button>
  <button class="filter-btn" data-filter="Phone"><span class="dot" style="border-color:var(--orange);background:var(--orange)"></span>Phone</button>
  <button class="filter-btn" data-filter="Interviewing"><span class="dot" style="border-color:var(--pink);background:var(--pink)"></span>Interviewing</button>
  <button class="filter-btn" data-filter="Offer"><span class="dot" style="border-color:var(--green);background:var(--green)"></span>Offer</button>
  <button class="filter-btn" data-filter="Rejected"><span class="dot" style="border-color:var(--red);background:var(--red)"></span>Rejected</button>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div class="jobs-list" id="jobs-list"></div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-titlebar">
      <span id="modal-title">// ADD JOB</span>
      <button id="close-x-btn" title="Close">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="field">
          <label>Company *</label>
          <input id="f-company" type="text" placeholder="e.g. Anthropic" />
        </div>
        <div class="field">
          <label>Role *</label>
          <input id="f-role" type="text" placeholder="e.g. Software Engineer" />
        </div>
        <div class="field">
          <label>Location</label>
          <input id="f-location" type="text" placeholder="e.g. San Francisco, CA" />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="f-status">
            <option value="Interested">Interested</option>
            <option value="Applied">Applied</option>
            <option value="Phone">Phone Screen</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offer">Offer</option>
            <option value="Rejected">Rejected</option>
            <option value="Withdrawn">Withdrawn</option>
          </select>
        </div>
        <div class="field">
          <label>Date Added</label>
          <input id="f-date" type="date" />
        </div>
        <div class="field">
          <label>Job URL</label>
          <input id="f-url" type="url" placeholder="https://…" />
        </div>
      </div>
      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Referral, recruiter name, next steps, interview impressions…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancel-btn">Cancel</button>
        <button class="btn-save" id="save-btn">Save →</button>
      </div>
    </div>
  </div>
</div>

<script>
  const STATUSES = ['Interested','Applied','Phone','Interviewing','Offer','Rejected','Withdrawn'];
  const STATUS_LABEL = { Phone: 'Phone Screen' };
  const STATUS_EMOJI = { Interested:'👀', Applied:'📬', Phone:'📞', Interviewing:'🎯', Offer:'🎉', Rejected:'✗', Withdrawn:'↩' };

  let jobs = [], editingId = null, activeFilter = 'All';

  async function load() {
    try { jobs = await (await fetch('/api/jobs')).json(); }
    catch { jobs = []; }
  }

  async function save() {
    await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(jobs),
    });
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function todayISO() { return new Date().toISOString().slice(0,10); }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    return `${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][+m-1]} ${+d}, ${y}`;
  }

  function filteredJobs() {
    return activeFilter === 'All' ? jobs : jobs.filter(j => j.status === activeFilter);
  }

  function renderStats() {
    const counts = {};
    STATUSES.forEach(s => counts[s] = 0);
    jobs.forEach(j => { if (counts[j.status] != null) counts[j.status]++; });

    document.getElementById('header-subtitle').textContent =
      `${jobs.length} JOB${jobs.length !== 1 ? 'S' : ''} TRACKED`;

    document.getElementById('stats').innerHTML = `
      <div class="stat-chip">
        <span class="n">${jobs.length}</span>
        <span class="l">Total</span>
      </div>
      ${STATUSES.filter(s => counts[s] > 0).map(s => `
        <div class="stat-chip">
          <span class="n s-${s}">${counts[s]}</span>
          <span class="l">${STATUS_EMOJI[s]} ${STATUS_LABEL[s] || s}</span>
        </div>`).join('')}
    `;
  }

  function renderJobs() {
    const list = document.getElementById('jobs-list');
    const shown = filteredJobs();

    if (shown.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="big">${activeFilter === 'All' ? '📋' : STATUS_EMOJI[activeFilter] || '🔍'}</div>
        <div class="msg">${activeFilter === 'All' ? 'Nothing here yet' : `No ${activeFilter} jobs`}</div>
        <p>${activeFilter === 'All' ? 'Hit "+ Add Job" to start tracking.' : 'Try a different filter.'}</p>
      </div>`;
      return;
    }

    list.innerHTML = shown.map(j => {
      const label = STATUS_LABEL[j.status] || j.status;
      const urlEl = j.url ? `<a class="card-actions" href="${escHtml(j.url)}" style="opacity:1;margin-top:0" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ View</a>` : '';
      return `
      <div class="job-card" onclick="openEdit('${j.id}')">
        <div class="card-stripe bg-${j.status}"></div>
        <div class="card-body">
          <div class="card-row1">
            <div>
              <div class="company">${escHtml(j.company)}</div>
              <div class="role">${escHtml(j.role)}</div>
              ${j.location ? `<div class="location">— ${escHtml(j.location)}</div>` : ''}
            </div>
            <span class="status-tag s-${j.status}">${STATUS_EMOJI[j.status]} ${label}</span>
          </div>
          <div class="card-row2">
            ${j.notes ? `<div class="notes-preview">"${escHtml(j.notes)}"</div>` : '<span></span>'}
            <div class="card-meta">
              <span class="date-tag">${fmtDate(j.date)}</span>
            </div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            ${j.url ? `<a href="${escHtml(j.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">↗ View</a>` : ''}
            <button onclick="openEdit('${j.id}')">Edit</button>
            <button class="del-btn" onclick="deleteJob('${j.id}')">Delete</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() { renderStats(); renderJobs(); }

  document.getElementById('filter-group').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderJobs();
  });

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = '// ADD JOB';
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-status').value = 'Interested';
    document.getElementById('f-date').value = todayISO();
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('f-company').focus(), 50);
  }

  function openEdit(id) {
    const j = jobs.find(x => x.id === id);
    if (!j) return;
    editingId = id;
    document.getElementById('modal-title').textContent = '// EDIT JOB';
    document.getElementById('f-company').value = j.company;
    document.getElementById('f-role').value = j.role;
    document.getElementById('f-location').value = j.location || '';
    document.getElementById('f-status').value = j.status;
    document.getElementById('f-date').value = j.date || '';
    document.getElementById('f-url').value = j.url || '';
    document.getElementById('f-notes').value = j.notes || '';
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    editingId = null;
  }

  document.getElementById('add-btn').addEventListener('click', openAdd);
  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  document.getElementById('close-x-btn').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const company = document.getElementById('f-company').value.trim();
    const role = document.getElementById('f-role').value.trim();
    document.getElementById('f-company').style.outline = company ? '' : '3px solid var(--red)';
    document.getElementById('f-role').style.outline    = role    ? '' : '3px solid var(--red)';
    if (!company || !role) return;

    const data = {
      company, role,
      location: document.getElementById('f-location').value.trim(),
      status:   document.getElementById('f-status').value,
      date:     document.getElementById('f-date').value,
      url:      document.getElementById('f-url').value.trim(),
      notes:    document.getElementById('f-notes').value.trim(),
    };

    if (editingId) {
      const idx = jobs.findIndex(j => j.id === editingId);
      if (idx !== -1) jobs[idx] = { ...jobs[idx], ...data };
    } else {
      jobs.unshift({ id: uid(), ...data });
    }

    await save();
    closeModal();
    render();
  });

  async function deleteJob(id) {
    if (!confirm('Delete this entry?')) return;
    jobs = jobs.filter(j => j.id !== id);
    await save();
    render();
  }

  (async () => { await load(); render(); })();
</script>
</body>
</html>
