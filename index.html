<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Tracker</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f2ff;
      --surface: #ffffff;
      --surface2: #faf9ff;
      --border: #e8e4ff;
      --text: #1a1535;
      --muted: #8b85a8;
      --accent: #7c5cfc;
      --accent2: #ff6b9d;

      --c-interested: #3b82f6;
      --c-applied:    #8b5cf6;
      --c-phone:      #f59e0b;
      --c-interview:  #f97316;
      --c-offer:      #10b981;
      --c-rejected:   #ef4444;
      --c-withdrawn:  #9ca3af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #7c5cfc 0%, #ff6b9d 100%);
      padding: 28px 36px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .header-left h1 {
      font-size: 24px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.5px;
    }

    .header-left .subtitle {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      margin-top: 3px;
    }

    /* ── Add button ── */
    button.add-btn {
      padding: 10px 22px;
      background: #fff;
      color: var(--accent);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
      transition: transform 0.1s, box-shadow 0.1s;
    }

    button.add-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    button.add-btn:active { transform: translateY(0); }

    /* ── Filter strip ── */
    .filter-strip {
      background: var(--surface);
      border-bottom: 2px solid var(--border);
      padding: 0 36px;
      display: flex;
      gap: 2px;
      overflow-x: auto;
    }

    .filter-strip::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 14px 18px;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .filter-btn .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.5;
    }

    .filter-btn:hover { color: var(--text); }

    .filter-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
      font-weight: 600;
    }

    /* ── Main ── */
    main {
      padding: 28px 36px;
      max-width: 1000px;
      margin: 0 auto;
    }

    /* ── Stats row ── */
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--surface);
      border-radius: 50px;
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(124,92,252,0.08);
      border: 1.5px solid var(--border);
    }

    .stat-pill .s-num {
      font-size: 16px;
      font-weight: 800;
    }

    .stat-pill .s-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 500;
    }

    /* ── Job cards ── */
    .jobs-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 0;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 8px rgba(124,92,252,0.06);
      border: 1.5px solid var(--border);
      overflow: hidden;
      display: flex;
    }

    .job-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,92,252,0.14);
    }

    .card-stripe {
      width: 5px;
      flex-shrink: 0;
    }

    .card-body {
      flex: 1;
      padding: 16px 20px;
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .company {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.2px;
    }

    .role {
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    .location {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .status-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
      flex-shrink: 0;
      color: #fff;
    }

    .card-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
      gap: 8px;
    }

    .notes-preview {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 480px;
      background: var(--surface2);
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .date {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .job-card:hover .card-actions { opacity: 1; }

    .card-actions button {
      padding: 4px 12px;
      border-radius: 50px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
    }

    .card-actions button:hover { color: var(--accent); border-color: var(--accent); }
    .card-actions .del-btn:hover { color: var(--c-rejected); border-color: var(--c-rejected); }

    .link-btn {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
    }

    .link-btn:hover { text-decoration: underline; }

    /* ── Status colors ── */
    .stripe-Interested,  .badge-Interested  { background: var(--c-interested); }
    .stripe-Applied,     .badge-Applied     { background: var(--c-applied); }
    .stripe-Phone,       .badge-Phone       { background: var(--c-phone); }
    .stripe-Interviewing,.badge-Interviewing{ background: var(--c-interview); }
    .stripe-Offer,       .badge-Offer       { background: var(--c-offer); }
    .stripe-Rejected,    .badge-Rejected    { background: var(--c-rejected); }
    .stripe-Withdrawn,   .badge-Withdrawn   { background: var(--c-withdrawn); }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 72px 20px;
      color: var(--muted);
    }

    .empty-state .big-emoji { font-size: 52px; }
    .empty-state .msg { margin-top: 14px; font-size: 17px; font-weight: 700; color: var(--text); }
    .empty-state p { margin-top: 6px; font-size: 13px; }

    /* ── Modal ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,21,53,0.45);
      backdrop-filter: blur(4px);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 20px;
      padding: 32px;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 64px rgba(124,92,252,0.2);
      border: 1.5px solid var(--border);
    }

    .modal-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .modal-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #7c5cfc, #ff6b9d);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .modal h2 { font-size: 18px; font-weight: 700; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field label {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .field input, .field select, .field textarea {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input:focus, .field select:focus, .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
    }

    .field textarea { resize: vertical; min-height: 90px; }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-secondary {
      padding: 10px 20px;
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
      border-radius: 50px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      transition: all 0.15s;
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--accent); }

    button.add-btn.modal-save {
      background: linear-gradient(135deg, #7c5cfc, #ff6b9d);
      color: #fff;
      border-radius: 50px;
      padding: 10px 24px;
      box-shadow: 0 4px 14px rgba(124,92,252,0.3);
    }

    @media (max-width: 600px) {
      header, .filter-strip, main { padding-left: 16px; padding-right: 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>💼 Job Search Tracker</h1>
    <div class="subtitle" id="header-subtitle">Loading…</div>
  </div>
  <button class="add-btn" id="add-btn">＋ Add Job</button>
</header>

<div class="filter-strip" id="filter-group">
  <button class="filter-btn active" data-filter="All">All</button>
  <button class="filter-btn" data-filter="Interested"><span class="dot" style="background:var(--c-interested)"></span>Interested</button>
  <button class="filter-btn" data-filter="Applied"><span class="dot" style="background:var(--c-applied)"></span>Applied</button>
  <button class="filter-btn" data-filter="Phone"><span class="dot" style="background:var(--c-phone)"></span>Phone Screen</button>
  <button class="filter-btn" data-filter="Interviewing"><span class="dot" style="background:var(--c-interview)"></span>Interviewing</button>
  <button class="filter-btn" data-filter="Offer"><span class="dot" style="background:var(--c-offer)"></span>Offer</button>
  <button class="filter-btn" data-filter="Rejected"><span class="dot" style="background:var(--c-rejected)"></span>Rejected</button>
</div>

<main>
  <div class="stats" id="stats"></div>
  <div class="jobs-list" id="jobs-list"></div>
</main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-icon">💼</div>
      <h2 id="modal-title">Add Job</h2>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Company *</label>
        <input id="f-company" type="text" placeholder="e.g. Anthropic" />
      </div>
      <div class="field">
        <label>Role *</label>
        <input id="f-role" type="text" placeholder="e.g. Software Engineer" />
      </div>
      <div class="field">
        <label>Location</label>
        <input id="f-location" type="text" placeholder="e.g. San Francisco, CA" />
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="Interested">Interested</option>
          <option value="Applied">Applied</option>
          <option value="Phone">Phone Screen</option>
          <option value="Interviewing">Interviewing</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
          <option value="Withdrawn">Withdrawn</option>
        </select>
      </div>
      <div class="field">
        <label>Date Added</label>
        <input id="f-date" type="date" />
      </div>
      <div class="field">
        <label>Job URL</label>
        <input id="f-url" type="url" placeholder="https://…" />
      </div>
    </div>
    <div class="field">
      <label>Notes</label>
      <textarea id="f-notes" placeholder="Referral, recruiter name, next steps, interview impressions…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" id="cancel-btn">Cancel</button>
      <button class="add-btn modal-save" id="save-btn">Save</button>
    </div>
  </div>
</div>

<script>
  const STATUSES = ['Interested','Applied','Phone','Interviewing','Offer','Rejected','Withdrawn'];
  const STATUS_EMOJI = { Interested:'👀', Applied:'📨', Phone:'📞', Interviewing:'🎯', Offer:'🎉', Rejected:'😔', Withdrawn:'🚪' };

  let jobs = [];
  let editingId = null;
  let activeFilter = 'All';

  async function load() {
    try {
      const res = await fetch('/api/jobs');
      jobs = await res.json();
    } catch { jobs = []; }
  }

  async function save() {
    await fetch('/api/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(jobs),
    });
  }

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function todayISO() { return new Date().toISOString().slice(0,10); }

  function fmtDate(iso) {
    if (!iso) return '';
    const [y,m,d] = iso.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[+m-1]} ${+d}, ${y}`;
  }

  function filteredJobs() {
    if (activeFilter === 'All') return jobs;
    return jobs.filter(j => j.status === activeFilter);
  }

  function statusVar(s) {
    return { Interested:'--c-interested', Applied:'--c-applied', Phone:'--c-phone',
             Interviewing:'--c-interview', Offer:'--c-offer', Rejected:'--c-rejected', Withdrawn:'--c-withdrawn' }[s] || '--accent';
  }

  function renderStats() {
    const counts = {};
    STATUSES.forEach(s => counts[s] = 0);
    jobs.forEach(j => { if (counts[j.status] !== undefined) counts[j.status]++; });
    const total = jobs.length;

    document.getElementById('stats').innerHTML = `
      <div class="stat-pill">
        <span class="s-num" style="color:var(--accent)">${total}</span>
        <span class="s-label">Total</span>
      </div>
      ${STATUSES.filter(s => counts[s] > 0).map(s => `
        <div class="stat-pill">
          <span class="s-num" style="color:var(${statusVar(s)})">${counts[s]}</span>
          <span class="s-label">${STATUS_EMOJI[s]} ${s === 'Phone' ? 'Phone' : s}</span>
        </div>`).join('')}
    `;
  }

  function renderJobs() {
    const list = document.getElementById('jobs-list');
    const shown = filteredJobs();

    document.getElementById('header-subtitle').textContent =
      jobs.length === 0 ? 'No jobs tracked yet'
      : `${jobs.length} job${jobs.length !== 1 ? 's' : ''} tracked`;

    if (shown.length === 0) {
      list.innerHTML = `<div class="empty-state">
        <div class="big-emoji">${activeFilter === 'All' ? '🗂️' : STATUS_EMOJI[activeFilter] || '🔍'}</div>
        <div class="msg">${activeFilter === 'All' ? 'No jobs yet!' : `No ${activeFilter} jobs`}</div>
        <p>${activeFilter === 'All' ? 'Click "+ Add Job" to track your first opportunity.' : 'Try a different filter.'}</p>
      </div>`;
      return;
    }

    list.innerHTML = shown.map(j => {
      const label = j.status === 'Phone' ? 'Phone Screen' : j.status;
      const urlEl = j.url ? `<a class="link-btn" href="${escHtml(j.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">View posting ↗</a>` : '';
      const notesEl = j.notes ? `<div class="notes-preview">📝 ${escHtml(j.notes)}</div>` : '';
      return `
      <div class="job-card" onclick="openEdit('${j.id}')">
        <div class="card-stripe stripe-${j.status}"></div>
        <div class="card-body">
          <div class="card-top">
            <div>
              <div class="company">${escHtml(j.company)}</div>
              <div class="role">${escHtml(j.role)}</div>
              ${j.location ? `<div class="location">📍 ${escHtml(j.location)}</div>` : ''}
            </div>
            <span class="status-badge badge-${j.status}">${STATUS_EMOJI[j.status]} ${label}</span>
          </div>
          <div class="card-bottom">
            ${notesEl || urlEl || '<span></span>'}
            <div class="date">${fmtDate(j.date)}</div>
          </div>
          <div class="card-actions" onclick="event.stopPropagation()">
            ${urlEl}
            <button onclick="openEdit('${j.id}')">✏️ Edit</button>
            <button class="del-btn" onclick="deleteJob('${j.id}')">🗑️ Delete</button>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() { renderStats(); renderJobs(); }

  document.getElementById('filter-group').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderJobs();
  });

  function openAdd() {
    editingId = null;
    document.getElementById('modal-title').textContent = 'Add Job';
    document.getElementById('f-company').value = '';
    document.getElementById('f-role').value = '';
    document.getElementById('f-location').value = '';
    document.getElementById('f-status').value = 'Interested';
    document.getElementById('f-date').value = todayISO();
    document.getElementById('f-url').value = '';
    document.getElementById('f-notes').value = '';
    document.getElementById('modal-backdrop').classList.add('open');
    document.getElementById('f-company').focus();
  }

  function openEdit(id) {
    const j = jobs.find(x => x.id === id);
    if (!j) return;
    editingId = id;
    document.getElementById('modal-title').textContent = 'Edit Job';
    document.getElementById('f-company').value = j.company;
    document.getElementById('f-role').value = j.role;
    document.getElementById('f-location').value = j.location || '';
    document.getElementById('f-status').value = j.status;
    document.getElementById('f-date').value = j.date || '';
    document.getElementById('f-url').value = j.url || '';
    document.getElementById('f-notes').value = j.notes || '';
    document.getElementById('modal-backdrop').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    editingId = null;
  }

  document.getElementById('add-btn').addEventListener('click', openAdd);
  document.getElementById('cancel-btn').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', e => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  document.getElementById('save-btn').addEventListener('click', async () => {
    const company = document.getElementById('f-company').value.trim();
    const role = document.getElementById('f-role').value.trim();
    if (!company || !role) {
      document.getElementById('f-company').style.borderColor = company ? '' : '#ef4444';
      document.getElementById('f-role').style.borderColor = role ? '' : '#ef4444';
      return;
    }
    document.getElementById('f-company').style.borderColor = '';
    document.getElementById('f-role').style.borderColor = '';

    const data = {
      company,
      role,
      location: document.getElementById('f-location').value.trim(),
      status: document.getElementById('f-status').value,
      date: document.getElementById('f-date').value,
      url: document.getElementById('f-url').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
    };

    if (editingId) {
      const idx = jobs.findIndex(j => j.id === editingId);
      if (idx !== -1) jobs[idx] = { ...jobs[idx], ...data };
    } else {
      jobs.unshift({ id: uid(), ...data });
    }

    await save();
    closeModal();
    render();
  });

  async function deleteJob(id) {
    if (!confirm('Delete this job entry?')) return;
    jobs = jobs.filter(j => j.id !== id);
    await save();
    render();
  }

  (async () => { await load(); render(); })();
</script>
</body>
</html>
